[package]
name = "cairndex-desktop"
version = "0.1.0"
description = "Cairndex desktop — Tauri shell wrapping the cairndex web UI"
edition = "2021"

[lib]
name = "cairndex_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[features]
custom-protocol = ["tauri/custom-protocol"]
