<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Cairndex icon: a stylized cairn (stack of stones marking a path) inside
       a deep slate-navy rounded square, with a cyan spark on top. Reads at
       16x16 because the silhouette is mostly horizontal bars + a circle. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <!-- Bottom stone (largest) -->
  <rect x="56" y="180" width="144" height="44" rx="20" fill="#cbd5e1"/>
  <!-- Middle stone -->
  <rect x="78" y="128" width="100" height="40" rx="18" fill="#94a3b8"/>
  <!-- Top stone -->
  <rect x="100" y="84" width="56" height="32" rx="14" fill="#64748b"/>
  <!-- Spark -->
  <circle cx="128" cy="50" r="14" fill="#22d3ee"/>
  <!-- Subtle highlight on the top stone for depth -->
  <rect x="106" y="88" width="32" height="6" rx="3" fill="#94a3b8" opacity="0.6"/>
</svg>
